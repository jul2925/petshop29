<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PetShop Prado — Sistema de PetShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage">
  <div class="login-card">
    <div class="logo">
      <h1>🐾 PetShop Prado</h1>
      <p>Sistema de PetShop</p>
    </div>
    <label>Usuario</label>
    <input type="text" id="loginUser" placeholder="Digite seu usuario">
    <label>Senha</label>
    <input type="password" id="loginPass" placeholder="Digite sua senha">
    <label>Tipo de Acesso</label>
    <select id="loginType">
      <option value="admin">Administrador</option>
      <option value="func">Funcionario</option>
      <option value="cliente">Cliente</option>
    </select>
    <button class="login-btn" id="loginBtn">Entrar</button>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div id="appPage">
  <button class="mobile-menu" id="mobileMenuBtn">☰</button>
  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h2>🐾 PetShop Prado</h2>
        <small>Sistema de PetShop</small>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-user">
        <div class="avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name" id="userName">Admin</div>
          <div class="user-role" id="userRole">Administrador</div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sair">⏻</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main" id="mainContent"></main>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox">
    <div class="modal-head"><h3 id="modalTitle"></h3><button class="modal-x" id="modalX">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div id="toastBox"></div>

<script src="database.js"></script>
<script src="app.js"></script>
</body>
</html>
